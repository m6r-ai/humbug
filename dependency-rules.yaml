# Dependency Rules Configuration
# This file defines module dependency rules with both internal and external dependencies in one place

modules:
  ai:
    internal_dependencies:
      - ai_tool
      - syntax
    external_dependencies:
      - "standard_library"
      - "aiohttp"
      - "certifi"

  ai_transcript_conversation:
    internal_dependencies:
      - ai
    external_dependencies:
      - "standard_library"

  ai_tool:
    external_dependencies:
      - "standard_library"

  clock_ai_tool:
    internal_dependencies:
      - ai_tool
    external_dependencies:
      - "standard_library"

  delegate_ai_tool:
    internal_dependencies:
      - ai
      - ai_transcript_conversation
      - ai_tool
    external_dependencies:
      - "standard_library"

  diff:
    internal_dependencies: []
    external_dependencies:
      - "standard_library"

  dmarkdown:
    internal_dependencies:
      - syntax
    external_dependencies:
      - "standard_library"

  docx:
    internal_dependencies: []
    external_dependencies:
      - "standard_library"

  filesystem_ai_tool:
    internal_dependencies:
      - ai_tool
      - diff
      - docx
      - pdf
      - syntax
    external_dependencies:
      - "standard_library"

  git:
    internal_dependencies: []
    external_dependencies:
      - "standard_library"

  help_ai_tool:
    internal_dependencies:
      - ai_tool
    external_dependencies:
      - "standard_library"

  humbug:
    internal_dependencies:
      - ai
      - ai_tool
      - ai_transcript_conversation
      - clock_ai_tool
      - delegate_ai_tool
      - diff
      - dmarkdown
      - filesystem_ai_tool
      - git
      - help_ai_tool
      - menai_ai_tool
      - mindspace
      - pdf
      - docx
      - syntax
      - terminal
    external_dependencies:
      - "standard_library"
      - "aiohttp"
      - "PySide6"
      - "qasync"

  menai:
    external_dependencies:
      - "standard_library"

  menai_ai_tool:
    internal_dependencies:
      - ai_tool
      - menai
    external_dependencies:
      - "standard_library"

  mindspace:
    internal_dependencies:
      - ai
      - ai_transcript_conversation
      - ai_tool
      - terminal
    external_dependencies:
      - "standard_library"

  pdf:
    internal_dependencies: []
    external_dependencies:
      - "standard_library"

  syntax:
    internal_dependencies: []
    external_dependencies:
      - "standard_library"

  terminal:
    internal_dependencies: []
    external_dependencies:
      - "standard_library"

# File patterns to ignore during checking
ignore_patterns:
  - "*/test_*.py"        # Test files
  - "*/tests/*"          # Test directories
  - "*/__pycache__/*"    # Python cache directories
  - "*.pyc"              # Compiled Python files
  - "*/.git/*"           # Git directories
  - "*/build/*"          # Build directories
  - "*/dist/*"           # Distribution directories

# Source root directory (relative to this config file)
src_root: "src"
