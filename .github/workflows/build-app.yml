name: Build App

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            label: macos-arm64
          - runner: macos-15-intel
            label: macos-x86_64
          - runner: windows-latest
            label: windows-x86_64

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller certifi pyside6 qasync

      - name: Fetch pre-built Menai C VM binary
        run: python fetch-menai-vm.py

      # macOS build
      - name: Import code signing certificate (macOS)
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PWD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          # Import the certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PWD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          # Set the cert identity for codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          security find-identity -v

      - name: Install create-dmg (macOS)
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Build app with PyInstaller (macOS)
        if: runner.os == 'macOS'
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
        run: pyinstaller humbug.spec --clean

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        run: ./build-dmg.sh

      - name: Notarize DMG (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit dist/Humbug.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple dist/Humbug.app

      - name: Cleanup keychain (macOS)
        if: runner.os == 'macOS' && always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          if security show-keychain-info "$KEYCHAIN_PATH" &>/dev/null; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: Humbug-${{ matrix.label }}
          path: dist/Humbug.dmg

      # Windows build
      - name: Install Inno Setup (Windows)
        if: runner.os == 'Windows'
        run: choco install innosetup -y --no-progress

      - name: Build app with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller humbug.spec --clean

      - name: Run Inno Setup (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          set ISCC=""
          if exist "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" set ISCC="C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if exist "C:\Program Files\Inno Setup 6\ISCC.exe" set ISCC="C:\Program Files\Inno Setup 6\ISCC.exe"
          if %ISCC%=="" (
            echo ERROR: Inno Setup not found.
            exit /b 1
          )
          %ISCC% humbug-installer.iss

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: Humbug-${{ matrix.label }}
          path: dist/Humbug-Setup.exe
