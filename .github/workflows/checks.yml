name: Code checks

# Run the full static-analysis suite (dependency checker, mypy, pylint) on every
# pull request, matching the CONTRIBUTING.md requirement.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-checker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run code checker
        run: python -m tools.code_checker
